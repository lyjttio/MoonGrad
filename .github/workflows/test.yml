name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Moon env (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libssl-dev
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup Moon env (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc openssl
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup Moon env (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSYS2 + MinGW + openssl (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-openssl

      - name: Set up Moon compatibility wrapper
        run: |
          mkdir -p "$HOME/.bin"
          cat << 'EOF' > "$HOME/.bin/moon"
          #!/bin/bash
          ARGS=()
          for arg in "$@"; do
            if [[ "$arg" != "--deny-warn" ]]; then
              ARGS+=("$arg")
            fi
          done
          
          # If the subcommand was 'fmt' and we stripped '--deny-warn', append '--check' to ensure it validates formatting
          if [[ "$1" == "fmt" ]]; then
            has_check=false
            for a in "${ARGS[@]}"; do
              if [[ "$a" == "--check" ]]; then
                has_check=true
              fi
            done
            if [[ "$has_check" == "false" ]]; then
              ARGS+=("--check")
            fi
          fi
          
          # Find the real moon executable
          if [[ -f "$HOME/.moon/bin/moon.exe" ]]; then
            REAL_MOON="$HOME/.moon/bin/moon.exe"
          else
            REAL_MOON="$HOME/.moon/bin/moon"
          fi
          
          exec "$REAL_MOON" "${ARGS[@]}"
          EOF
          chmod +x "$HOME/.bin/moon"
          echo "$HOME/.bin" >> "$GITHUB_PATH"

      - name: moon check
        run: moon check --deny-warn

      - name: moon fmt --deny-warn
        run: moon fmt --deny-warn

      - name: moon info --deny-warn
        run: |
          moon info --deny-warn
          git diff --exit-code
          git status

      - name: moontest
        run: |
          # Run tests with coverage reporting
          moon test --deny-warn --enable-coverage
          moon coverage report -f summary
          moon coverage analyze

          # Run native backend tests
          moon test --deny-warn --target native --enable-coverage
          moon coverage report -f summary
          moon coverage analyze
